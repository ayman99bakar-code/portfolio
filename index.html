<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Space Portfolio Orbit</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="space-bg"></div>

  <!-- CENTER / HOME BUTTON (SUN) -->
  <div id="sun">
    About me
  </div>

  <!-- PROJECT INFO PANEL -->
  <div class="info" id="project-info">
    <button class="close-btn">✕</button>
    <div id="info-content"></div>
  </div>

  <!-- ORBIT SYSTEM -->
  <div id="orbit-container">
    <div class="planet" id="el0"></div>
    <div class="planet" id="el1"></div>
    <div class="planet" id="el2"></div>
    <div class="planet" id="el3"></div>
    <div class="planet" id="el4"></div>
  </div>
  <div id="legend">
  <h3>Project Map</h3>
  <div class="legend-item">
    <span class="dot blue"></span> Image Gallery
  </div>
  <div class="legend-item">
    <span class="dot red"></span> Calculator
  </div>
  <div class="legend-item">
    <span class="dot yellow"></span> Recipes
  </div>
  <div class="legend-item">
    <span class="dot green"></span> Project 4
  </div>
  <div class="legend-item">
    <span class="dot purple"></span> Project 5
  </div>
</div>

  <script src="script.js"></script>
</body>
</html>
