<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Space Portfolio Orbit</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="space-bg"></div>

  <!-- CENTER / HOME BUTTON (SUN) -->
  <div id="sun">
    Portfolio
  </div>

  <!-- PROJECT INFO PANEL -->
  <div class="info" id="project-info">
    Click a planet to view project
  </div>

  <!-- ORBIT SYSTEM -->
  <div id="orbit-container">
    <div class="planet" id="el0"></div>
    <div class="planet" id="el1"></div>
    <div class="planet" id="el2"></div>
    <div class="planet" id="el3"></div>
    <div class="planet" id="el4"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
